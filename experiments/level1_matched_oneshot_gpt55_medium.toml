[experiment]
name = "level1-matched-oneshot-gpt55-medium"
description = "Level 1 matched same-machine one-shot PTX vs CUDA control run for GPT-5.5 medium."
run_name = "level1-matched-oneshot-gpt55-medium"
spec_version = "v1"
phase = "full"
provider = "codex"
model = "gpt-5.5"
model_family = "gpt-5.5"
paper_model_label = "gpt55_medium"
reasoning_effort = "medium"
track = "oneshot"
level = 1
arch = "sm_89"
precision = "fp32"
num_correct_trials = 5
num_perf_trials = 100
official_eval_seed = 42
timeout_seconds = 1800
chunk_size = 5
max_concurrent_chunks = 1
parallel_backends = false
device = "cuda:0"
codex_bin = "codex"

[lock]
locked = true
canonical = true
machine_label = "Native Ubuntu on local RTX 4090"

[claims]
comparison_goal = "Same-machine Level 1 one-shot GPT-5.5 medium PTX vs CUDA comparison for the paper model matrix."
claim_scope = ["Canonical Level 1 model-matrix one-shot PTX-vs-CUDA comparison for GPT-5.5 medium."]
kernelbench_parity_scope = "Use the CUDA side of this exact spec as the same-machine KernelBench-style one-shot control for GPT-5.5 medium."

[evidence]
required_outputs = [
  "runs/level1-matched-oneshot-gpt55-medium/paper_run_manifest.json",
  "results/timing/level1-matched-oneshot-gpt55-medium/ptx/level1/summary.json",
  "results/timing/level1-matched-oneshot-gpt55-medium/cuda/level1/summary.json",
  "results/analysis/level1-matched-oneshot-gpt55-medium_level1.json",
  "results/analysis/level1-matched-oneshot-gpt55-medium_level1.md",
]

[notes]
items = [
  "Uses Codex config model_reasoning_effort=medium.",
  "Do not change model, arch, trials, timeout, or reasoning effort without creating a new spec file.",
]
