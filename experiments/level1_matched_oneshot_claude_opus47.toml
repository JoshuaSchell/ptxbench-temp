[experiment]
name = "level1-matched-oneshot-claude-opus47"
description = "Level 1 matched same-machine one-shot PTX vs CUDA control run for Claude Opus 4.7."
run_name = "level1-matched-oneshot-claude-opus47"
spec_version = "v1"
phase = "full"
provider = "claude-code"
model = "claude-opus-4-7"
model_family = "claude-opus"
paper_model_label = "claude_opus47"
reasoning_effort = "medium"
track = "oneshot"
level = 1
arch = "sm_89"
precision = "fp32"
num_correct_trials = 5
num_perf_trials = 100
official_eval_seed = 42
timeout_seconds = 1800
chunk_size = 5
max_concurrent_chunks = 1
parallel_backends = false
device = "cuda:0"
claude_bin = "claude"
claude_extra_args = ["--bare", "--no-session-persistence"]

[lock]
locked = true
canonical = true
machine_label = "Native Ubuntu on local RTX 4090"

[claims]
comparison_goal = "Same-machine Level 1 one-shot Claude Opus 4.7 PTX vs CUDA comparison for the paper model matrix."
claim_scope = ["Canonical Level 1 model-matrix one-shot PTX-vs-CUDA comparison for Claude Opus 4.7."]
kernelbench_parity_scope = "Use the CUDA side of this exact spec as the same-machine KernelBench-style one-shot control for Claude Opus 4.7."

[evidence]
required_outputs = [
  "runs/level1-matched-oneshot-claude-opus47/paper_run_manifest.json",
  "results/timing/level1-matched-oneshot-claude-opus47/ptx/level1/summary.json",
  "results/timing/level1-matched-oneshot-claude-opus47/cuda/level1/summary.json",
  "results/analysis/level1-matched-oneshot-claude-opus47_level1.json",
  "results/analysis/level1-matched-oneshot-claude-opus47_level1.md",
]

[notes]
items = ["Uses Claude Code pass-through args: --effort medium --bare --no-session-persistence."]
