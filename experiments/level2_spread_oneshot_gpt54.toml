[experiment]
name = "level2-spread-oneshot-gpt54"
description = "Level 2 same-machine one-shot PTX vs CUDA spread run over the representative Level 2 subset."
run_name = "level2-spread-oneshot-gpt54"
spec_version = "v1"
phase = "full"
provider = "codex"
model = "gpt-5.4"
track = "oneshot"
level = 2
arch = "sm_89"
precision = "fp32"
num_correct_trials = 5
num_perf_trials = 100
official_eval_seed = 42
timeout_seconds = 1800
problem_ids = [1, 2, 8, 18, 23, 28, 33, 43]
chunk_size = 4
max_concurrent_chunks = 1
parallel_backends = false
device = "cuda:0"
codex_bin = "codex"

[lock]
locked = true
canonical = false
machine_label = "Native Ubuntu on local RTX 4090"

[claims]
comparison_goal = "Level 2 one-shot spread run to sample a broader workload mix without paying for the full Level 2 sweep."
kernelbench_parity_scope = "Exploratory spread only. Do not use this representative subset as a full Level 2 parity claim."

[evidence]
required_outputs = [
  "runs/level2-spread-oneshot-gpt54/paper_run_manifest.json",
  "results/timing/level2-spread-oneshot-gpt54/ptx/level2/summary.json",
  "results/timing/level2-spread-oneshot-gpt54/cuda/level2/summary.json",
  "results/analysis/level2-spread-oneshot-gpt54_level2.json",
  "results/analysis/level2-spread-oneshot-gpt54_level2.md",
]

[notes]
items = [
  "Locked exploratory spread run for Level 2 one-shot behavior.",
  "Uses the representative Level 2 subset: 1, 2, 8, 18, 23, 28, 33, 43.",
  "Intended for overnight breadth after validating the Level 1 one-shot pipeline.",
]
