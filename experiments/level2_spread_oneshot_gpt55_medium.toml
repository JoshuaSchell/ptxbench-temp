[experiment]
name = "level2-spread-oneshot-gpt55-medium"
description = "Level 2 one-shot PTX vs CUDA spread run for GPT-5.5 medium."
run_name = "level2-spread-oneshot-gpt55-medium"
spec_version = "v1"
phase = "full"
provider = "codex"
model = "gpt-5.5"
model_family = "gpt-5.5"
paper_model_label = "gpt55_medium"
reasoning_effort = "medium"
track = "oneshot"
level = 2
arch = "sm_89"
precision = "fp32"
num_correct_trials = 5
num_perf_trials = 100
official_eval_seed = 42
timeout_seconds = 1800
problem_ids = [1, 2, 8, 18, 23, 28, 33, 43]
chunk_size = 4
max_concurrent_chunks = 1
parallel_backends = false
device = "cuda:0"
codex_bin = "codex"

[lock]
locked = true
canonical = false
machine_label = "Native Ubuntu on local RTX 4090"

[claims]
comparison_goal = "Level 2 GPT-5.5 medium spread run over the representative subset."
claim_scope = ["Exploratory Level 2 spread subset only."]
kernelbench_parity_scope = "Exploratory spread only. Do not use this representative subset as a full Level 2 parity claim."

[evidence]
required_outputs = [
  "runs/level2-spread-oneshot-gpt55-medium/paper_run_manifest.json",
  "results/timing/level2-spread-oneshot-gpt55-medium/ptx/level2/summary.json",
  "results/timing/level2-spread-oneshot-gpt55-medium/cuda/level2/summary.json",
  "results/analysis/level2-spread-oneshot-gpt55-medium_level2.json",
  "results/analysis/level2-spread-oneshot-gpt55-medium_level2.md",
]

[notes]
items = ["Uses Codex config model_reasoning_effort=medium."]
