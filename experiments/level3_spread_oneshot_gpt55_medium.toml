[experiment]
name = "level3-spread-oneshot-gpt55-medium"
description = "Level 3 one-shot PTX vs CUDA spread run for GPT-5.5 medium."
run_name = "level3-spread-oneshot-gpt55-medium"
spec_version = "v1"
phase = "full"
provider = "codex"
model = "gpt-5.5"
model_family = "gpt-5.5"
paper_model_label = "gpt55_medium"
reasoning_effort = "medium"
track = "oneshot"
level = 3
arch = "sm_89"
precision = "fp32"
num_correct_trials = 5
num_perf_trials = 100
official_eval_seed = 42
timeout_seconds = 1800
problem_ids = [1, 5, 9, 15, 20, 28, 35, 43, 50]
chunk_size = 3
max_concurrent_chunks = 1
parallel_backends = false
device = "cuda:0"
codex_bin = "codex"

[lock]
locked = true
canonical = false
machine_label = "Native Ubuntu on local RTX 4090"

[claims]
comparison_goal = "Level 3 GPT-5.5 medium spread run over the representative subset."
claim_scope = ["Exploratory Level 3 spread subset only."]
kernelbench_parity_scope = "Exploratory spread only. Do not use this representative subset as a full Level 3 parity claim."

[evidence]
required_outputs = [
  "runs/level3-spread-oneshot-gpt55-medium/paper_run_manifest.json",
  "results/timing/level3-spread-oneshot-gpt55-medium/ptx/level3/summary.json",
  "results/timing/level3-spread-oneshot-gpt55-medium/cuda/level3/summary.json",
  "results/analysis/level3-spread-oneshot-gpt55-medium_level3.json",
  "results/analysis/level3-spread-oneshot-gpt55-medium_level3.md",
]

[notes]
items = ["Uses Codex config model_reasoning_effort=medium."]
