[experiment]
name = "level1-pilot-oneshot-gpt55-medium"
description = "Level 1 one-shot PTX vs CUDA pilot for GPT-5.5 medium on the fixed pilot subset."
run_name = "level1-pilot-oneshot-gpt55-medium"
spec_version = "v1"
phase = "pilot"
provider = "codex"
model = "gpt-5.5"
model_family = "gpt-5.5"
paper_model_label = "gpt55_medium"
reasoning_effort = "medium"
track = "oneshot"
level = 1
arch = "sm_89"
precision = "fp32"
num_correct_trials = 5
num_perf_trials = 100
official_eval_seed = 42
timeout_seconds = 900
problem_ids = [1, 3, 19, 23, 40]
chunk_size = 5
max_concurrent_chunks = 1
parallel_backends = false
device = "cuda:0"
codex_bin = "codex"

[lock]
locked = true
canonical = false
machine_label = "Native Ubuntu on local RTX 4090"

[claims]
comparison_goal = "Level 1 GPT-5.5 medium pilot to validate model-matrix benchmark plumbing."
claim_scope = ["Pilot only; not a final paper claim."]
kernelbench_parity_scope = "Protocol validation only. Do not use this pilot run for final parity or superiority claims."

[evidence]
required_outputs = [
  "runs/level1-pilot-oneshot-gpt55-medium/paper_run_manifest.json",
  "results/timing/level1-pilot-oneshot-gpt55-medium/ptx/level1/summary.json",
  "results/timing/level1-pilot-oneshot-gpt55-medium/cuda/level1/summary.json",
  "results/analysis/level1-pilot-oneshot-gpt55-medium_level1.json",
  "results/analysis/level1-pilot-oneshot-gpt55-medium_level1.md",
]

[notes]
items = [
  "Uses Codex config model_reasoning_effort=medium.",
  "Uses the fixed Level 1 pilot subset: 1, 3, 19, 23, 40.",
]
