[experiment]
name = "level1-pilot-oneshot-gpt55-high"
description = "Small Level 1 one-shot ablation for GPT-5.5 high reasoning on the fixed pilot subset."
run_name = "level1-pilot-oneshot-gpt55-high"
spec_version = "v1"
phase = "pilot"
provider = "codex"
model = "gpt-5.5"
model_family = "gpt-5.5"
paper_model_label = "gpt55_high"
reasoning_effort = "high"
track = "oneshot"
level = 1
arch = "sm_89"
precision = "fp32"
num_correct_trials = 5
num_perf_trials = 100
official_eval_seed = 42
timeout_seconds = 900
problem_ids = [1, 3, 19, 23, 40]
chunk_size = 5
max_concurrent_chunks = 1
parallel_backends = false
device = "cuda:0"
codex_bin = "codex"

[lock]
locked = true
canonical = false
machine_label = "Native Ubuntu on local RTX 4090"

[claims]
comparison_goal = "Small ablation to test whether higher reasoning helps PTX authoring."
claim_scope = ["Exploratory reasoning-effort ablation only."]
kernelbench_parity_scope = "Pilot ablation only. Do not use this run for final parity or superiority claims."

[evidence]
required_outputs = [
  "runs/level1-pilot-oneshot-gpt55-high/paper_run_manifest.json",
  "results/timing/level1-pilot-oneshot-gpt55-high/ptx/level1/summary.json",
  "results/timing/level1-pilot-oneshot-gpt55-high/cuda/level1/summary.json",
  "results/analysis/level1-pilot-oneshot-gpt55-high_level1.json",
  "results/analysis/level1-pilot-oneshot-gpt55-high_level1.md",
]

[notes]
items = ["Uses Codex config model_reasoning_effort=high."]
